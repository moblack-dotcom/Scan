*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#050505;
  color:#F4F4F4;
  font-family:'Jost',sans-serif;
  font-weight:300;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
a:focus-visible,button:focus-visible{outline:1.5px solid #fff;outline-offset:4px}

/* ---------- Nav ---------- */
header{
  position:fixed;top:0;left:0;right:0;z-index:10;
}
.nav{
  position:relative;
  display:flex;align-items:center;
  padding:30px 48px;gap:40px;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:2.4rem;font-weight:600;
  line-height:1;color:#fff;
  letter-spacing:.01em;
}
.logo b{font-weight:600;font-size:1.13em;line-height:0}
.nav-center{
  display:flex;gap:52px;
  position:absolute;left:50%;transform:translateX(-50%);
}
.nav-center a{
  font-size:.8rem;font-weight:400;
  letter-spacing:.24em;text-transform:uppercase;
  opacity:.92;transition:opacity .25s;
}
.nav-center a:hover{opacity:1}
.menu{
  display:flex;align-items:center;gap:16px;
  margin-inline-start:auto;
  background:none;border:0;cursor:pointer;
  font-family:inherit;color:#F4F4F4;
  font-size:.8rem;letter-spacing:.24em;text-transform:uppercase;
}
.bars{display:inline-flex;flex-direction:column;gap:6px}
.bars i{display:block;width:30px;height:1.5px;background:#F4F4F4}

/* ---------- Overlay Menu ---------- */
.overlay{
  position:fixed;inset:0;z-index:60;
  background:rgba(5,5,5,.97);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:38px;
  opacity:0;visibility:hidden;
  transition:opacity .35s,visibility .35s;
}
.overlay.open{opacity:1;visibility:visible}
.overlay a{
  font-size:1.3rem;font-weight:300;
  letter-spacing:.34em;text-indent:.34em;
  text-transform:uppercase;
  opacity:.85;transition:opacity .25s;
}
.overlay a:hover{opacity:1}
.overlay .close{
  position:absolute;top:30px;inset-inline-end:44px;
  background:none;border:0;cursor:pointer;
  color:#F4F4F4;font-size:2rem;font-weight:300;
  font-family:inherit;line-height:1;
}

/* ---------- Hero ---------- */
.hero{
  position:relative;
  min-height:100svh;
  display:flex;flex-direction:column;
  align-items:center;
  text-align:center;
  padding:20vh 24px 0;
  overflow:hidden;
}
@keyframes slowZoom{
  from{transform:scale(1)}
  to{transform:scale(1.16)}
}

  .hero-bg{animation:none !important}
}

h1{
  font-size:clamp(2rem,6.4vw,4.8rem);
  font-weight:400;
  letter-spacing:.46em;
  text-indent:.46em;
  line-height:1.15;
  color:#fff;
  white-space:nowrap;
}
.sub{
  margin-top:30px;
  font-size:clamp(.9rem,2vw,1.25rem);
  font-weight:300;
  letter-spacing:.55em;text-indent:.55em;
  text-transform:uppercase;
}
.btn{
  display:inline-flex;align-items:center;gap:14px;
  margin-top:46px;
  background:rgba(8,8,8,.78);
  border:1px solid rgba(255,255,255,.18);
  padding:17px 36px;
  font-size:.8rem;font-weight:400;
  letter-spacing:.24em;text-transform:uppercase;
  transition:all .3s;
}
.btn .arrow{font-size:1rem;transition:transform .3s}
.btn:hover{background:rgba(22,22,22,.9);border-color:rgba(255,255,255,.45)}
.btn:hover .arrow{transform:translateX(6px)}

@media (max-width:900px){
  .nav{padding:22px 24px}
  .nav-center{display:none}
  .logo{font-size:2rem}
  .menu span:not(.bars){display:none}
  .hero{padding-top:24vh}
  .hero-bg{background-size:cover;background-position:center 85%}
  h1{white-space:normal;letter-spacing:.3em;text-indent:.3em}
}
</style>
</head>
<body>

<header>
  <nav class="nav">
    <div class="logo"><b>i</b>Z<b>i</b>Z</div>
    <div class="nav-center">
      <a href="#">Home</a>
      <a href="#">Collection</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
    <button class="menu" id="menuBtn" type="button" aria-label="Menu" aria-expanded="false" aria-controls="overlay">
      <span>Menu</span>
      <span class="bars" aria-hidden="true"><i></i><i></i><i></i></span>
    </button>
  </nav>
</header>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Menu">
  <button class="close" id="closeBtn" type="button" aria-label="Close">✕</button>
  <a href="#">Home</a>
  <a href="#">Collection</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>

<main class="hero">
  <div class="hero-bg" aria-hidden="true"></div>
  <h1>Built for More</h1>
  <div class="sub">Coming Soon</div>
  <a class="btn" href="#">
    <span>Discover More</span>
    <span class="arrow" aria-hidden="true">→</span>
  </a>
</main>

<script>
const ov = document.getElementById('overlay');
const menuBtn = document.getElementById('menuBtn');
const closeBtn = document.getElementById('closeBtn');
function openMenu(){ ov.classList.add('open'); menuBtn.setAttribute('aria-expanded','true'); closeBtn.focus(); }
function closeMenu(){ ov.classList.remove('open'); menuBtn.setAttribute('aria-expanded','false'); menuBtn.focus(); }
menuBtn.addEventListener('click', openMenu);
closeBtn.addEventListener('click', closeMenu);
ov.addEventListener('click', e=>{ if(e.target.tagName==='A' || e.target===ov) closeMenu(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && ov.classList.contains('open')) closeMenu(); });
</script>
</body>
